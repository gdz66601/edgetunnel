name: Deploy Worker via API

permissions:
  contents: read

on:
  push:
    paths:
      - "_worker.js"
      - "wrangler.toml"
      - "scripts/deploy-worker.mjs"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy worker
        env:
          ADMIN: ${{ secrets.ADMIN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_COMPATIBILITY_DATE: ${{ vars.CF_COMPATIBILITY_DATE }}
          CF_KV_NAMESPACE_TITLE: ${{ vars.CF_KV_NAMESPACE_TITLE }}
          CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
          CF_WORKER_PLAINTEXT_BINDINGS_JSON: ${{ vars.CF_WORKER_PLAINTEXT_BINDINGS_JSON }}
          CF_WORKER_SECRET_BINDINGS_JSON: ${{ secrets.CF_WORKER_SECRET_BINDINGS_JSON }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: node ./scripts/deploy-worker.mjs
